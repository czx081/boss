<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minimal Agent</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="layout">
    <aside class="sidebar">
      <div>
        <p class="eyebrow">FROM SCRATCH</p>
        <h1>Minimal Agent</h1>
        <p class="muted">多轮对话、持久任务、工具循环和执行 Trace。</p>
      </div>
      <button id="new-session" class="secondary">+ 新建 Session</button>
      <section>
        <h2>Sessions</h2>
        <div id="sessions" class="session-list"></div>
      </section>
      <div id="health" class="health">正在检查服务...</div>
    </aside>

    <section class="chat-panel">
      <div id="messages" class="messages">
        <div class="welcome">
          <p class="eyebrow">READY</p>
          <h2>给 Agent 一个任务</h2>
          <p>试试“计算 (18 + 6) * 4”、“查询上海天气”，或者“创建一个准备项目演示的任务”。</p>
        </div>
      </div>
      <form id="chat-form" class="composer">
        <textarea id="message-input" rows="2" placeholder="输入消息，Enter 发送，Shift + Enter 换行" required></textarea>
        <button id="send-button" type="submit">发送</button>
      </form>
    </section>

    <aside class="trace-panel">
      <div class="trace-heading">
        <div>
          <p class="eyebrow">RUNTIME</p>
          <h2>Execution Trace</h2>
        </div>
        <span id="step-count" class="badge">0 events</span>
      </div>
      <div id="traces" class="traces">
        <p class="muted">Memory、LLM 和工具调用记录会显示在这里。</p>
      </div>
    </aside>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
